<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zé Agrotóxico: O Jogo de Luta</title>
    <style>
        body { background: #0c0f12; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; user-select: none; }
        h1 { color: #2ecc71; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        h2 { color: #bdc3c7; font-size: 16px; margin-bottom: 20px; }
        
        /* ARENA CONFIGURADA COM A SUA FOTO DO WHATSAPP */
        #arena { 
            width: 900px; 
            height: 450px; 
            background: url('personagens/WhatsApp Image 2026-05-24 at 17.38.47.jpeg') no-repeat center center;
            background-size: cover;
            background-color: #1e272e; 
            border: 5px solid #34495e; 
            margin: 20px auto; 
            position: relative; 
            overflow: hidden; 
            display: none; 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); 
        }
        
        .barra-vida { width: 300px; height: 25px; background: #c0392b; border: 2px solid #fff; position: absolute; top: 20px; border-radius: 5px; }
        #vida1 { left: 20px; } 
        #vida2 { right: 20px; }

        .progresso { 
            height: 100%; 
            background: #2ecc71; 
            width: 100%; 
            transition: width 0.1s ease; 
        }

        #timer { 
            font-size: 50px; 
            font-weight: bold; 
            color: #f1c40f; 
            position: absolute; 
            top: 10px; 
            width: 100%; 
            text-align: center; 
            text-shadow: 2px 2px 4px #000; 
        }
        
        /* COMPONENTES DOS PERSONAGENS E MOVIMENTOS */
        .player { 
            width: 120px; 
            height: 180px; 
            position: absolute; 
            bottom: 20px; 
            text-align: center; 
            transition: transform 0.1s ease, left 0.05s linear; 
        }

        .player img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            object-position: top center; 
            border-radius: 8px; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); 
        }

        .player-nome { 
            position: absolute; 
            top: -25px; 
            width: 100%; 
            text-align: center; 
            font-weight: bold; 
            background: rgba(0,0,0,0.8); 
            padding: 2px 0; 
            border-radius: 3px; 
            font-size: 13px; 
            color: #fff; 
        }

        #p1 { left: 150px; } 
        #p2 { right: 150px; }
        
        /* ANIMAÇÕES DE ATAQUE FÍSICO */
        .ataque-j1 { transform: translateX(50px) rotate(12deg) scale(1.08); }
        .ataque-j2 { transform: translateX(-50px) rotate(-12deg) scale(1.08); }

        .apanhando { 
            animation: tremer 0.15s infinite; 
            filter: sepia(1) saturate(5) hue-rotate(-50deg); 
        }
        
        @keyframes tremer {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(0deg); }
        }

        /* PODER ESPECIAL */
        .poder-especial {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #2ecc71 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            border: 2px dashed #f1c40f;
            animation: voarPoder 0.4s linear forwards;
            box-shadow: 0 0 25px #2ecc71;
        }

        @keyframes voarPoder {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.8); opacity: 0; }
        }

        /* TELA DE SELEÇÃO */
        #tela-selecao {
            width: 950px;
            margin: 0 auto;
            background: #1a1f25;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #2c3e50;
        }

        #modo {
            margin-bottom: 20px;
            font-size: 18px;
        }

        #modo label {
            margin: 0 15px;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 20px;
        }

        .card {
            background: #2c3e50;
            padding: 8px;
            border: 3px solid #34495e;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            width: 100%;
            height: 110px;
            object-fit: contain;
            object-position: top center;
            border-radius: 5px;
            margin-bottom: 8px;
            background: #161a1d;
        }

        .card strong {
            display: block;
            font-size: 14px;
            margin-bottom: 3px;
            color: #ecf0f1;
        }

        .card small {
            color: #2ecc71;
            font-size: 11px;
            display: block;
            height: 20px;
            overflow: hidden;
        }

        .card.p1-sel {
            border-color: #3498db;
            background: #1f4068;
            box-shadow: 0 0 15px #3498db;
        }

        .card.p2-sel {
            border-color: #e74c3c;
            background: #4b1212;
            box-shadow: 0 0 15px #e74c3c;
        }
        
        #controles {
            margin-top: 25px;
            background: #161a1d;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #34495e;
            display: inline-block;
            text-align: left;
            max-width: 800px;
        }

        #controles h3 {
            margin-top: 0;
            color: #f1c40f;
            border-bottom: 1px solid #34495e;
            padding-bottom: 5px;
        }

        .btn-jogar {
            background: #2ecc71;
            color: #fff;
            padding: 15px 50px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 25px;
            border-radius: 5px;
            text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(46,204,113,0.4);
        }

        kbd {
            background: #ecf0f1;
            color: #2c3e50;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Zé Agrotóxico: Combate Químico</h1>

<div id="tela-selecao">

    <div id="modo">
        <label>
            <input type="radio" name="modoJogo" value="P2" checked onclick="mudarModo('P2')">
            👥 2 Jogadores
        </label>

        <label>
            <input type="radio" name="modoJogo" value="CPU" onclick="mudarModo('CPU')">
            🤖 Contra a IA
        </label>
    </div>

    <h2>
        Jogador 1 escolhe nas setas | Jogador 2 clica no personagem
    </h2>

    <div class="grid" id="grid-personagens"></div>

    <button class="btn-jogar" onclick="iniciarJogo()">
        Entrar na Arena ⚔️
    </button>

</div>

<div id="arena">

    <div id="timer">60</div>

    <div class="barra-vida" id="vida1">
        <div class="progresso" id="barra1"></div>
    </div>

    <div class="barra-vida" id="vida2">
        <div class="progresso" id="barra2"></div>
    </div>

    <div id="p1" class="player">
        <div class="player-nome" id="nome-p1">P1</div>
        <img id="img-p1" src="">
    </div>

    <div id="p2" class="player">
        <div class="player-nome" id="nome-p2">P2</div>
        <img id="img-p2" src="">
    </div>

</div>

<div id="controles">

    <h3>📜 CONTROLES</h3>

    <strong>🕹️ JOGADOR 1:</strong>
    Andar: <kbd>A</kbd> / <kbd>D</kbd> |
    Soco: <kbd>J</kbd> |
    Chute: <kbd>K</kbd> |
    Super: <kbd>I</kbd>

    <br><br>

    <strong>🕹️ JOGADOR 2:</strong>
    Andar: <kbd>⬅️</kbd> / <kbd>➡️</kbd> |
    Soco: <kbd>1</kbd> |
    Chute: <kbd>2</kbd> |
    Super: <kbd>5</kbd>

</div>

<script>

const listaPersonagens = [

    { nome: "Benzênico", poder: "Gás Aromático", img: "personagens/WhatsApp Image 2026-05-24 at 16.14.34.jpeg" },

    { nome: "Insectus", poder: "Garras e Voo", img: "personagens/WhatsApp Image 2026-05-24 at 16.14.48.jpeg" },

    { nome: "Fungor", poder: "Pó Cegante", img: "personagens/WhatsApp Image 2026-05-24 at 16.15.03(1).jpeg" },

    { nome: "Agricultor", poder: "Machado Pró", img: "personagens/WhatsApp Image 2026-05-24 at 16.15.03.jpeg" },

    { nome: "Fazendeiro", poder: "Foice Ninja", img: "personagens/WhatsApp Image 2026-05-24 at 16.15.23.jpeg" },

    { nome: "Colmeia", poder: "Espirro de Mel", img: "personagens/WhatsApp Image 2026-05-24 at 16.15.36.jpeg" },

    { nome: "Florares", poder: "Encanto Real", img: "personagens/WhatsApp Image 2026-05-24 at 16.15.48.jpeg" },

    { nome: "Firme", poder: "Força Gigante", img: "personagens/WhatsApp Image 2026-05-24 at 16.16.05.jpeg" },

    { nome: "Chuva Ácida", poder: "Ácido Corrosivo", img: "personagens/WhatsApp Image 2026-05-24 at 16.16.17.jpeg" },

    { nome: "Guardião da Selva", poder: "Raízes de Faca", img: "personagens/WhatsApp Image 2026-05-24 at 16.16.27.jpeg" },

    { nome: "Carvão Tetravalente", poder: "Braços Robô", img: "personagens/WhatsApp Image 2026-05-24 at 16.16.38.jpeg" },

    { nome: "Glicosado", poder: "Golpe Tontiante", img: "personagens/WhatsApp Image 2026-05-24 at 16.31.45.jpeg" },

    { nome: "Cipermetrina", poder: "Ataque Mosquito", img: "personagens/cipermetrina personagem.jpg" }

];

let p1Sel = 0;
let p2Sel = 1;
let modo = 'P2';

let jogoRodando = false;

let tempo = 60;

let v1 = 100;
let v2 = 100;

let pos1 = 150;
let pos2 = 650;

function renderSelecao() {

    const grid = document.getElementById('grid-personagens');

    grid.innerHTML = '';

    listaPersonagens.forEach((p, idx) => {

        let classe = 'card';

        if(idx === p1Sel) classe += ' p1-sel';

        if(idx === p2Sel) classe += ' p2-sel';

        grid.innerHTML += `
            <div class="${classe}" onclick="selecionar(${idx})">
                <img src="${p.img}">
                <strong>${p.nome}</strong>
                <small>${p.poder}</small>
            </div>
        `;
    });
}

function selecionar(idx) {

    p2Sel = idx;

    renderSelecao();
}

function mudarModo(m) {

    modo = m;

    if(modo === 'CPU') {

        p2Sel = Math.floor(Math.random() * listaPersonagens.length);
    }

    renderSelecao();
}

function aplicarGolpe(atacanteId, defensorId, tipo) {

    const elAtacante = document.getElementById(atacanteId);

    const elDefensor = document.getElementById(defensorId);

    elAtacante.classList.add(
        atacanteId === 'p1' ? 'ataque-j1' : 'ataque-j2'
    );

    if(Math.abs(pos1 - pos2) < 140) {

        if(defensorId === 'p2') {

            v2 -= (tipo === 'super' ? 16 : 7);

        } else {

            v1 -= (tipo === 'super' ? 16 : 7);
        }

        elDefensor.classList.add('apanhando');

        setTimeout(() => {

            elDefensor.classList.remove('apanhando');

        }, 150);
    }

    if(tipo === 'super') {

        let fx = document.createElement('div');

        fx.className = 'poder-especial';

        fx.style.left = ((pos1 + pos2) / 2 + 30) + 'px';

        fx.style.bottom = '80px';

        document.getElementById('arena').appendChild(fx);

        setTimeout(() => {

            fx.remove();

        }, 400);
    }

    setTimeout(() => {

        elAtacante.classList.remove('ataque-j1', 'ataque-j2');

    }, 100);

    atualizarMundo();
}

window.addEventListener('keydown', (e) => {

    if(!jogoRodando) {

        if(e.key === 'ArrowLeft') {

            p1Sel = (p1Sel > 0)
                ? p1Sel - 1
                : listaPersonagens.length - 1;

            renderSelecao();
        }

        if(e.key === 'ArrowRight') {

            p1Sel = (p1Sel < listaPersonagens.length - 1)
                ? p1Sel + 1
                : 0;

            renderSelecao();
        }

        return;
    }

    if(e.key === 'a' || e.key === 'A') {

        if(pos1 > 20) pos1 -= 25;
    }

    if(e.key === 'd' || e.key === 'D') {

        if(pos1 < pos2 - 90) pos1 += 25;
    }

    if(e.key === 'ArrowLeft') {

        if(pos2 > pos1 + 90) pos2 -= 25;
    }

    if(e.key === 'ArrowRight') {

        if(pos2 < 780) pos2 += 25;
    }

    if(e.key === 'j' || e.key === 'J') {

        aplicarGolpe('p1', 'p2', 'soco');
    }

    if(e.key === 'k' || e.key === 'K') {

        aplicarGolpe('p1', 'p2', 'chute');
    }

    if(e.key === 'i' || e.key === 'I') {

        aplicarGolpe('p1', 'p2', 'super');
    }

    if(modo === 'P2') {

        if(e.key === '1') {

            aplicarGolpe('p2', 'p1', 'soco');
        }

        if(e.key === '2') {

            aplicarGolpe('p2', 'p1', 'chute');
        }

        if(e.key === '5') {

            aplicarGolpe('p2', 'p1', 'super');
        }
    }

    atualizarMundo();
});

function iniciarJogo() {

    document.getElementById('tela-selecao').style.display = 'none';

    document.getElementById('arena').style.display = 'block';

    document.getElementById('nome-p1').innerText =
        listaPersonagens[p1Sel].nome;

    document.getElementById('img-p1').src =
        listaPersonagens[p1Sel].img;

    document.getElementById('nome-p2').innerText =
        listaPersonagens[p2Sel].nome;

    document.getElementById('img-p2').src =
        listaPersonagens[p2Sel].img;

    jogoRodando = true;

    tempo = 60;

    v1 = 100;
    v2 = 100;

    pos1 = 150;
    pos2 = 650;

    atualizarMundo();

    let cronometro = setInterval(() => {

        if(!jogoRodando) {

            clearInterval(cronometro);

            return;
        }

        tempo--;

        document.getElementById('timer').innerText = tempo;

        if(modo === 'CPU' && jogoRodando) {

            if(pos2 > pos1 + 110) {

                pos2 -= 20;

            } else {

                aplicarGolpe('p2', 'p1', 'soco');
            }
        }

        if(tempo <= 0 || v1 <= 0 || v2 <= 0) {

            jogoRodando = false;

            clearInterval(cronometro);

            if(v1 === v2) {

                alert("⏱️ TEMPO ESGOTADO: EMPATE!");

            } else if(v1 > v2) {

                alert("🏆 VITÓRIA DO JOGADOR 1: " + listaPersonagens[p1Sel].nome + "!");

            } else {

                alert("🏆 VITÓRIA DO JOGADOR 2: " + listaPersonagens[p2Sel].nome + "!");
            }

            location.reload();
        }

    }, 1000);
}

function atualizarMundo() {

    document.getElementById('p1').style.left = pos1 + 'px';

    document.getElementById('p2').style.left = pos2 + 'px';

    document.getElementById('barra1').style.width =
        (v1 < 0 ? 0 : v1) + '%';

    document.getElementById('barra2').style.width =
        (v2 < 0 ? 0 : v2) + '%';
}

renderSelecao();

</script>

</body>
</html>
